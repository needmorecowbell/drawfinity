name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Drawfinity v__VERSION__'
          releaseBody: |
            ## Drawfinity v__VERSION__

            ### Downloads
            - **Linux**: `.deb` (Debian/Ubuntu), `.rpm` (Fedora/RHEL), `.AppImage` (universal)
            - **macOS**: `.dmg` (Intel & Apple Silicon)
            - **Windows**: `.msi` (installer), `.exe` (NSIS installer)

            ### What's included
            - Infinite canvas with pressure-sensitive drawing
            - WebGL2 rendering pipeline
            - Real-time collaboration via WebSocket/Yjs
            - Brush, eraser, and shape tools
            - Camera bookmarks
            - Turtle graphics programming mode
            - PNG export
          releaseDraft: ${{ github.event.inputs.draft || true }}
          prerelease: false

      - name: Fix AppImage for cross-distro compatibility
        run: |
          # The CI-built AppImage bundles Ubuntu's shared libraries (WebKitGTK,
          # EGL, Mesa, etc.) which are incompatible with non-Ubuntu distros —
          # causing EGL_BAD_PARAMETER crashes on Arch/Manjaro/Fedora. Selectively
          # stripping creates broken dependency chains, so we remove ALL bundled
          # .so files. The AppImage keeps its binary, desktop integration, icons,
          # and GTK config but uses the host system's libraries at runtime.
          # Tauri already requires system WebKitGTK as a runtime dependency.
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' 2>/dev/null | head -1)
          if [ -n "$APPIMAGE" ]; then
            chmod +x "$APPIMAGE"
            "$APPIMAGE" --appimage-extract

            # Remove ALL bundled shared libraries — use host system's instead
            find squashfs-root/usr/lib -maxdepth 1 -name '*.so*' -delete
            rm -rf squashfs-root/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1/
            rm -rf squashfs-root/usr/lib/dri/

            # Repack the AppImage
            wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
            chmod +x appimagetool
            ARCH=x86_64 ./appimagetool squashfs-root "$APPIMAGE"

            rm -rf squashfs-root appimagetool
          fi

      - name: Upload fixed AppImage to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' 2>/dev/null | head -1)
          if [ -n "$APPIMAGE" ]; then
            gh release upload "v$(jq -r .version package.json)" "$APPIMAGE" --clobber
          fi

      - name: Build server binary
        run: cd server && cargo build --release

      - name: Upload server binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp server/target/release/drawfinity-server drawfinity-server-linux-amd64
          gh release upload "v$(jq -r .version package.json)" drawfinity-server-linux-amd64 --clobber

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Drawfinity v__VERSION__'
          releaseDraft: ${{ github.event.inputs.draft || true }}
          prerelease: false

      - name: Build server binary
        run: cd server && cargo build --release

      - name: Upload server binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp server/target/release/drawfinity-server drawfinity-server-macos-arm64
          gh release upload "v$(jq -r .version package.json)" drawfinity-server-macos-arm64 --clobber

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Drawfinity v__VERSION__'
          releaseDraft: ${{ github.event.inputs.draft || true }}
          prerelease: false

      - name: Build server binary
        run: cd server && cargo build --release

      - name: Upload server binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cp server/target/release/drawfinity-server.exe drawfinity-server-windows-amd64.exe
          gh release upload "v$(jq -r .version package.json)" drawfinity-server-windows-amd64.exe --clobber
