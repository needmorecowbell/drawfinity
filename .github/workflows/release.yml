name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Drawfinity v__VERSION__'
          releaseBody: |
            ## Drawfinity v__VERSION__

            ### Downloads
            - **Linux**: `.deb` (Debian/Ubuntu), `.rpm` (Fedora/RHEL), `.tar.gz` (portable binary)
            - **macOS**: `.dmg` (Intel & Apple Silicon)
            - **Windows**: `.msi` (installer), `.exe` (NSIS installer)

            ### What's included
            - Infinite canvas with pressure-sensitive drawing
            - WebGL2 rendering pipeline
            - Real-time collaboration via WebSocket/Yjs
            - Brush, eraser, and shape tools
            - Camera bookmarks
            - Turtle graphics programming mode
            - PNG export
          releaseDraft: ${{ github.event.inputs.draft || true }}
          prerelease: false

      - name: Create portable Linux tarball
        run: |
          # AppImage bundles Ubuntu's WebKitGTK + EGL stack which is incompatible
          # with non-Ubuntu distros. Provide a portable tarball with just the binary
          # that uses the host system's libraries.
          VERSION=$(jq -r .version package.json)
          TARBALL_DIR="drawfinity-${VERSION}-linux-amd64"
          mkdir -p "$TARBALL_DIR"
          cp src-tauri/target/release/drawfinity "$TARBALL_DIR/"
          cp src-tauri/icons/128x128.png "$TARBALL_DIR/drawfinity.png"
          cat > "$TARBALL_DIR/drawfinity.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=Drawfinity
          Comment=Infinite canvas drawing app with real-time collaboration
          Exec=drawfinity
          Icon=drawfinity
          Terminal=false
          Type=Application
          Categories=Graphics;
          DESKTOP
          # Remove leading spaces from heredoc
          sed -i 's/^          //' "$TARBALL_DIR/drawfinity.desktop"
          tar czf "${TARBALL_DIR}.tar.gz" "$TARBALL_DIR"
          rm -rf "$TARBALL_DIR"

      - name: Upload Linux tarball to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r .version package.json)
          gh release upload "v${VERSION}" "drawfinity-${VERSION}-linux-amd64.tar.gz" --clobber

      - name: Build server binary
        run: cd server && cargo build --release

      - name: Upload server binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp server/target/release/drawfinity-server drawfinity-server-linux-amd64
          gh release upload "v$(jq -r .version package.json)" drawfinity-server-linux-amd64 --clobber

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Drawfinity v__VERSION__'
          releaseDraft: ${{ github.event.inputs.draft || true }}
          prerelease: false

      - name: Build server binary
        run: cd server && cargo build --release

      - name: Upload server binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp server/target/release/drawfinity-server drawfinity-server-macos-arm64
          gh release upload "v$(jq -r .version package.json)" drawfinity-server-macos-arm64 --clobber

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Drawfinity v__VERSION__'
          releaseDraft: ${{ github.event.inputs.draft || true }}
          prerelease: false

      - name: Build server binary
        run: cd server && cargo build --release

      - name: Upload server binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cp server/target/release/drawfinity-server.exe drawfinity-server-windows-amd64.exe
          gh release upload "v$(jq -r .version package.json)" drawfinity-server-windows-amd64.exe --clobber
