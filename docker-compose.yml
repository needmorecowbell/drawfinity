services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - server-data:/data
    environment:
      DRAWFINITY_PORT: "8080"
      DRAWFINITY_DATA_DIR: /data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "1420:1420"
    depends_on:
      server:
        condition: service_healthy

volumes:
  server-data:
